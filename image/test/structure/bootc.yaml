schemaVersion: 2.0.0

# Structure assertions for localhost/embercleave-bootc:test. Verifies the
# bootc image has the right packages, the swarm user with linger, the
# Quadlet templates / target / tmpfiles in their image-managed locations,
# and the embedded worker image is present in containers-storage.

fileExistenceTests:
  - name: worker quadlet template
    path: /etc/containers/systemd/embercleave-worker@.container
    shouldExist: true
    permissions: "-rw-r--r--"

  - name: manager service unit (host-level, not a Quadlet)
    path: /etc/systemd/user/embercleave-mgr.service
    shouldExist: true
    permissions: "-rw-r--r--"

  - name: swarm target unit
    path: /etc/systemd/user/embercleave.target
    shouldExist: true
    permissions: "-rw-r--r--"

  - name: no manager Quadlet (manager runs on host)
    path: /etc/containers/systemd/embercleave-mgr.container
    shouldExist: false

  - name: tmpfiles.d snippet
    path: /etc/tmpfiles.d/embercleave.conf
    shouldExist: true

  - name: linger flag for swarm user
    path: /var/lib/systemd/linger/swarm
    shouldExist: true

  - name: worker tarball cleaned up after podman load
    path: /var/lib/containers/storage-import/embercleave-worker.tar
    shouldExist: false

fileContentTests:
  - name: tmpfiles.d declares /run/embercleave swarm:swarm 0750
    path: /etc/tmpfiles.d/embercleave.conf
    expectedContents:
      - "d /run/embercleave 0750 swarm swarm -"

  - name: worker quadlet uses correct image
    path: /etc/containers/systemd/embercleave-worker@.container
    expectedContents:
      - "Image=localhost/embercleave-worker:latest"

  - name: manager service execs the host-installed pi binary
    path: /etc/systemd/user/embercleave-mgr.service
    expectedContents:
      - "ExecStart=/usr/bin/pi"

commandTests:
  - name: bootc binary present
    command: which
    args: ["bootc"]
    expectedOutput: ["^/usr/bin/bootc$"]

  - name: swarm user defined in /etc/passwd
    command: getent
    args: ["passwd", "swarm"]
    expectedOutput: ["^swarm:"]

  - name: swarm shell is bash
    command: getent
    args: ["passwd", "swarm"]
    expectedOutput: [":/bin/bash$"]

  - name: pi-coding-agent globally installed
    command: npm
    args: ["ls", "-g", "--depth=0", "--parseable", "@mariozechner/pi-coding-agent"]
    expectedOutput: ["@mariozechner/pi-coding-agent"]

  - name: all four embercleave packages globally installed
    command: sh
    args:
      - "-c"
      - "npm ls -g --depth=0 --parseable @serisium/embercleave-protocol @serisium/embercleave-worker @serisium/embercleave-manager @serisium/embercleave-quadlet"
    expectedOutput:
      - "@serisium/embercleave-protocol"
      - "@serisium/embercleave-worker"
      - "@serisium/embercleave-manager"
      - "@serisium/embercleave-quadlet"

  - name: embedded worker image present in containers-storage
    command: sh
    args:
      - "-c"
      - "podman --root /var/lib/containers/storage images --format '{{.Repository}}:{{.Tag}}' | grep -E '^localhost/embercleave-worker:latest$'"
    expectedOutput: ["^localhost/embercleave-worker:latest$"]

  - name: target unit enabled image-wide via systemctl --global
    command: sh
    args:
      - "-c"
      - "test -L /etc/systemd/user/default.target.wants/embercleave.target && echo enabled"
    expectedOutput: ["^enabled$"]

  - name: manager service enabled (WantedBy=embercleave.target cascade)
    command: sh
    args:
      - "-c"
      - "test -L /etc/systemd/user/embercleave.target.wants/embercleave-mgr.service && echo enabled"
    expectedOutput: ["^enabled$"]

metadataTest:
  labels:
    - key: containers.bootc
      value: "1"
